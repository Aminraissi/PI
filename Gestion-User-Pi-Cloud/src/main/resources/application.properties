spring.application.name=gestion-user
spring.config.import=optional:file:./application-local.properties,optional:file:./config/application-local.properties


spring.datasource.url=jdbc:mysql://localhost:3306/gestionUser?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
server.port=8081


spring.mvc.log-request-details=true
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG

jwt.secret=${jwt.secret}
jwt.expiration=${jwt.expiration}

#eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true 


twilio.account-sid=${twilio.account-sid}
twilio.auth-token=${twilio.auth-token}
twilio.verify-service-sid=${twilio.verify-service-sid}

google.client-id=${google.client-id}


recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
recaptcha.site-key=${recaptcha.site-key}
recaptcha.secret-key=${recaptcha.secret-key}




spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


spring.mail.username=${spring.mail.username}
spring.mail.password=${spring.mail.password}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.application.name=gateway

server.port=8089

# =========================
# EUREKA CONFIG (K8s FIX)
# =========================
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.instance.hostname=gateway

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# DISABLE SPRING CONFIG SERVER (FIX CRASHLOOP)
# =========================
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# =========================
# LOGGING (DEBUG GATEWAY)
# =========================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=gateway
info.app.version=0.0.1-SNAPSHOT

# =========================
# GATEWAY ROUTES
# =========================

# -------- USER SERVICE --------
spring.cloud.gateway.server.webmvc.routes[0].id=gestion-user
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://GESTION-USER
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1


spring.application.name=GESTION-USER
server.port=8081

# =========================
# EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=gestion-user

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# IMPORTANT : permet l'enregistrement correct dans Kubernetes
eureka.instance.instance-id=${spring.application.name}:${random.value}

# =========================
# DATABASE (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://mysql-gestion-user:3306/gestionUser?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# GOOGLE OAUTH (IMPORTANT FIX)
# =========================
google.client-id=270359567342-1evqop862k1bolr40f5qsn47b4d9q4rl.apps.googleusercontent.com

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =========================
# MAIL
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# =========================
# RECAPTCHA
# =========================
recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
recaptcha.site-key=${RECAPTCHA_SITE_KEY}
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

# =========================
# TWILIO
# =========================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID}

# =========================
# STRIPE
# =========================
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}

# =========================
# GEMINI
# =========================
gemini.api-key=${GEMINI_API_KEY}

# =========================
# ACTUATOR (DEBUG MICROSERVICES)
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

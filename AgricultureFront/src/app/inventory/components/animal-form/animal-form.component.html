<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>
        <i class="fas fa-horse" style="color:#2d6a2d;margin-right:8px;"></i>
        {{ isEdit ? 'Modify Animal' : 'Add Animal' }}
      </h2>
      <button class="close-btn" (click)="cancelled.emit()"><i class="fas fa-times"></i></button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="modal-body">

      <div class="form-row">
        <div class="form-group">
          <label>Species *</label>
          <input formControlName="espece" placeholder="ex: Cow, Sheep, Goat..."
                 [class.err]="invalid('espece')">
          <span class="err-msg" *ngIf="invalid('espece')">Field required</span>
        </div>
        <div class="form-group">
          <label>Reference</label>
          <input formControlName="reference"
                 [placeholder]="isEdit ? 'Generated automatically (locked)' : 'Generated automatically'"
                 readonly>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Weight (kg) *</label>
          <input type="number" formControlName="poids" min="0.01" step="0.1"
                 placeholder="ex: 350" [class.err]="invalid('poids')">
          <span class="err-msg" *ngIf="invalid('poids')">Weight > 0 required</span>
        </div>
        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date" formControlName="dateNaissance"
                 [class.err]="invalid('dateNaissance')">
          <span class="err-msg" *ngIf="invalid('dateNaissance')">Date required</span>
        </div>
      </div>

      <div class="err-msg global" *ngIf="error">{{ error }}</div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="cancelled.emit()">Cancel</button>
        <button type="submit" class="btn btn-save" [disabled]="loading">
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          {{ isEdit ? 'Save' : 'Create' }}
        </button>
      </div>

    </form>
  </div>
</div>

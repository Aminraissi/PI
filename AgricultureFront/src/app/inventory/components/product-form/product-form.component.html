<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>{{ isEdit ? 'Modify Product' : 'Add Product' }}</h2>
      <button class="close-btn" (click)="cancelled.emit()"><i class="fas fa-times"></i></button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="modal-body">
      <div class="form-row">
        <div class="form-group full">
          <label>Name *</label>
          <input formControlName="nom" placeholder="ex: Engrais NPK" [class.err]="invalid('nom')">
          <span class="err-msg" *ngIf="invalid('nom')">Field required</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select formControlName="categorie" [class.err]="invalid('categorie')">
            <option value="">-- choose --</option>
            <option *ngFor="let c of categories" [value]="c">{{ catLabels[c] }}</option>
          </select>
          <span class="err-msg" *ngIf="invalid('categorie')">Field required</span>
        </div>
        <div class="form-group">
          <label>Unit *</label>
          <input formControlName="unit" placeholder="kg, L, piece..." [class.err]="invalid('unit')">
          <span class="err-msg" *ngIf="invalid('unit')">Field required</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full">
          <label>Minimum threshold *</label>
          <input type="number" formControlName="minThreshold" min="0" [class.err]="invalid('minThreshold')">
          <span class="err-msg" *ngIf="invalid('minThreshold')">Value >= 0 required</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full">
          <label>Note</label>
          <input formControlName="note" placeholder="ex: Initial supplier batch">
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isPerishable">
          <span>Perishable product</span>
        </label>
      </div>

      <div class="form-hint">
        The stock, purchase price, and dates can be updated later from the <strong>Lots</strong> interface.
      </div>

      <div class="err-msg" *ngIf="error" style="margin-top:8px;">{{ error }}</div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="cancelled.emit()">Cancel</button>
        <button type="submit" class="btn btn-save" [disabled]="loading">
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          {{ isEdit ? 'Save' : 'Create' }}
        </button>
      </div>

    </form>
  </div>
</div>

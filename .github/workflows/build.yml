name: Build and Push Docker Images
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-push:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agriculture-front
            context: ./AgricultureFront
            image: agriculture-front
          - name: gestion-user-pi-cloud
            context: ./Gestion-User-Pi-Cloud
            image: gestion-user-pi-cloud
          - name: assistance-service
            context: ./pi-cloud222/Assistance-Service/Assistance-Service
            image: assistance-service
          - name: eureka
            context: ./pi-cloud222/Eureka/eureka
            image: eureka
          - name: gateway
            context: ./pi-cloud222/Gateway
            image: gateway
          - name: gestion-event
            context: ./pi-cloud222/Gestion-Event
            image: gestion-event
          - name: gestion-formation
            context: ./pi-cloud222/Gestion-Formation/Gestion-Formation
            image: gestion-formation
          - name: gestion-pret
            context: ./pi-cloud222/Gestion-Pret
            image: gestion-pret
          - name: gestion-reclamation
            context: ./pi-cloud222/Gestion-Reclamation
            image: gestion-reclamation
          - name: gestion-vente-location
            context: ./pi-cloud222/Gestion-Vente-Location
            image: gestion-vente-location
          - name: gestion-inventory-and-appointment
            context: ./pi-cloud222/Gestion_Inventory_and_Appointment
            image: gestion-inventory-and-appointment
          - name: livraison
            context: ./pi-cloud222/Livraison/Livraison
            image: livraison
          - name: payment-service
            context: ./pi-cloud222/Payment-Service
            image: payment-service
          - name: farmer-support
            context: ./pi-cloud222/farmer-support/farmer-support
            image: farmer-support
          - name: gestion-forum
            context: ./pi-cloud222/gestion-forum/ForumsService
            image: gestion-forum
          - name: pi-cloud-explorer
            context: ./pi-cloud222/pi-cloud-Explorer/Explorer
            image: pi-cloud-explorer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest

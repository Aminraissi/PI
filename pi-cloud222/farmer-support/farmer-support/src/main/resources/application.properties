spring.application.name=farmer-support





spring.datasource.url=jdbc:mysql://localhost:3306/farmersupport1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update




spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#server.servlet.context-path=/Formation
server.port=8091


#swager
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false
springdoc.swagger-ui.path=/swagger-ui.html

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true 

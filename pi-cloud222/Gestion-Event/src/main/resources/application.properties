spring.application.name=GestionEvenement
spring.config.import=optional:file:./application-local.properties,optional:file:./config/application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/gestionEvenement?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#server.servlet.context-path=/gestionEvenement
server.port=8087

#swagger
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false
springdoc.swagger-ui.path=/swagger-ui.html

#logging
spring.mvc.log-request-details=true
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true




#mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com




stripe.secret-key=${stripe.secret-key}
stripe.publishable.key=${stripe.publishable.key}
gemini.api.key=${gemini.api.key}
spring.mail.username=${spring.mail.username}
spring.mail.password=${spring.mail.password}

spring.application.name=livraison-service
server.port=8083

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/aletheia_livraison?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# Local default: do not require config-server to start the service
spring.cloud.config.enabled=false
spring.cloud.config.fail-fast=false

# Actuator fallback (used when config-server is unavailable)
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=livraison-service
info.app.version=0.0.1-SNAPSHOT

# OpenAPI / Swagger UI
springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.error.include-message=always
server.error.include-binding-errors=always

# OpenFeign client defaults
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.default.loggerLevel=basic

# If false, livraison creation is not blocked when user-service is temporarily unavailable.
app.user-validation.strict=false

# Weather pricing
app.weather.api-base=https://api.open-meteo.com/v1/forecast
app.weather.timeout-ms=4000
app.weather.cache-ttl-seconds=120

# Farmer chatbot (Groq)
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=llama-3.1-8b-instant
app.groq.api-url=https://api.groq.com/openai/v1/chat/completions
app.groq.timeout-ms=12000


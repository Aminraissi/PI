spring.application.name=Gestion-Inventaire
spring.datasource.url=jdbc:mysql://localhost:3306/inventory?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8088

server.servlet.context-path=/inventaires

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.config.enabled=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.chat.upload-dir=chat-uploads

poultry.ml.service.url=http://localhost:5002
app.upload-dir=uploads


# JWT
jwt.secret=MyVeryStrongJwtSecretKeyForGestionUserAppAtLeastThirtyTwoChars
springdoc.use-fqn=true

# Jackson: serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
ml.service.url=http://localhost:5001

#
## Planification rappel SMS (la veille du rendez-vous)
# test: toutes les 1 min
appointment.reminder.cron=0 */1 * * * *


# ?? Publications (articles / vidťos) ??
app.posts.upload-dir=post-uploads





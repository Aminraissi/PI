spring.application.name=Gestion-Inventaire
spring.datasource.url=jdbc:mysql://localhost:3306/inventory?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8088

server.servlet.context-path=/inventaires

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.config.enabled=false

# JWT
jwt.secret=MyVeryStrongJwtSecretKeyForGestionUserAppAtLeastThirtyTwoChars
springdoc.use-fqn=true

# Jackson: serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
ml.service.url=http://localhost:5001
gemini.enabled=true
gemini.model=gemini-2.5-flash



appointment.reminder.cron=0 */1 * * * *


# ?? Publications (articles / vid�os) ??
app.posts.upload-dir=post-uploads

spring.application.name=Gestion-Inventaire
spring.config.import=optional:file:./application-local.properties,optional:file:./config/application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/inventory?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8088

server.servlet.context-path=/inventaires

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.config.enabled=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.chat.upload-dir=chat-uploads

poultry.ml.service.url=http://localhost:5002
app.upload-dir=uploads


# JWT
# Move secrets to local configuration (application-local.properties).
# Do NOT commit real secrets; load from local config or environment.
jwt.secret=${jwt.secret:}
springdoc.use-fqn=true

# Jackson: serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
ml.service.url=http://localhost:5001

#
## Planification rappel SMS (la veille du rendez-vous)
# test: toutes les 1 min
appointment.reminder.cron=0 */1 * * * *


# ?? Publications (articles / vid�os) ??
app.posts.upload-dir=post-uploads

app.frontend.url=http://localhost:4200/

stripe.secret.key=${stripe.secret.key:}
stripe.publishable.key=${stripe.publishable.key:}
stripe.webhook.secret=${stripe.webhook.secret:}


gemini.enabled=true
gemini.model=gemini-2.5-flash
gemini.api.key=${gemini.api.key}
groq.enabled=true
groq.model=llama-3.3-70b-versatile
groq.api.key=${groq.api.key}




#SMS Twilio
twilio.sms.enabled=true
twilio.account-sid=${twilio.account-sid}
twilio.auth-token=${twilio.auth-token}${twilio.auth-token}
twilio.phone-number=${twilio.phone-number}
twilio.default-country-code=+216

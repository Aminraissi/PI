spring.application.name=Gestion-Reclamation

spring.datasource.url=jdbc:mysql://localhost:3306/reclamation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8095

server.servlet.context-path=/reclamations



# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.config.enabled=false

# JWT
jwt.secret=MyVeryStrongJwtSecretKeyForGestionUserAppAtLeastThirtyTwoChars
springdoc.use-fqn=true

# Jackson: serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

clients.user-service.url=http://localhost:8081
reclamation.upload-dir=uploads/reclamations

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

moderation.groq.fail-closed=true


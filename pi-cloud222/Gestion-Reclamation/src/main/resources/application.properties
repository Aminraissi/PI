spring.application.name=Gestion-Reclamation
spring.config.import=optional:file:./application-local.properties,optional:file:./config/application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/reclamation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8095

server.servlet.context-path=/reclamations



# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.config.enabled=false

# JWT
# Move secrets to local configuration (application-local.properties).
# Do NOT commit real secrets. Load the JWT secret from local config or environment.
jwt.secret=${jwt.secret:}
springdoc.use-fqn=true

# Jackson: serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

clients.user-service.url=http://localhost:8081
reclamation.upload-dir=uploads/reclamations

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB



moderation.groq.fail-closed=true
gemini.enabled=true
gemini.model=gemini-2.5-flash
gemini.api.key=${gemini.api.key}
groq.enabled=true
groq.model=llama-3.3-70b-versatile
groq.api.key=${groq.api.key}
twilio.sms.enabled=true
twilio.account-sid=${twilio.account-sid}
twilio.auth-token=${twilio.auth-token}${twilio.auth-token}
twilio.phone-number=${twilio.phone-number}
twilio.default-country-code=+216

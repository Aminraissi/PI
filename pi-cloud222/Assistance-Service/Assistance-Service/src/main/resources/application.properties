spring.application.name=Assistance-Service


spring.datasource.url=jdbc:mysql://localhost:3306/Assistance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#server.servlet.context-path=/Formation
server.port=8084

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#swager
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false
springdoc.swagger-ui.path=/swagger-ui.html

#openai key
gemini.api.key=${gemini.api.key}
gemini.model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com

# Format: RegionName:expertId,expertId;OtherRegion:expertId
# Example: assistance.expert-routing.region-experts=Sfax:12,15;Tunis:20
assistance.expert-routing.region-experts=${ASSISTANCE_REGION_EXPERTS:}
assistance.expert-routing.default-experts=${ASSISTANCE_DEFAULT_EXPERTS:}



spring.application.name=gestion-forum
server.port=8085
spring.config.import=optional:file:./application-local.properties,optional:file:./config/application-local.properties,optional:file:./pi-cloud222/gestion-forum/ForumsService/application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/forums?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=INFO


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# AI forum assistant settings
forums.ai.enabled=true
forums.ai.gemini.model=gemma-3-1b-it
forums.ai.gemini.api-key=${forums.ai.gemini.api-key}
forums.ai.image-moderation.enabled=true
forums.ai.image-moderation.provider=huggingface
forums.ai.huggingface.api-key=${forums.ai.huggingface.api-key}
forums.ai.huggingface.model=Falconsai/nsfw_image_detection
forums.ai.huggingface.endpoint=https://router.huggingface.co/hf-inference/models/Falconsai/nsfw_image_detection
forums.ai.huggingface.context-model=Ateeqq/nsfw-image-detection
forums.ai.huggingface.context-endpoint=https://router.huggingface.co/hf-inference/models/Ateeqq/nsfw-image-detection
forums.ai.huggingface.threshold.reject=0.70
forums.ai.huggingface.threshold.review=0.40

# Auto-hide thresholds for moderation reporting
forums.moderation.report-threshold.post=1
forums.moderation.report-threshold.reply=1
forums.moderation.report-threshold.comment=1

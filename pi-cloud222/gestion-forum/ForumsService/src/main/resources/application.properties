spring.application.name=gestion-forum
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/forums?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=INFO


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# AI forum assistant settings
forums.ai.enabled=true
forums.ai.gemini.model=gemma-3-1b-it
forums.ai.gemini.api-key=${GEMINI_API_KEY:}

# Auto-hide thresholds for moderation reporting
forums.moderation.report-threshold.post=1
forums.moderation.report-threshold.reply=1
forums.moderation.report-threshold.comment=1

spring.application.name=gateway
server.port=8089

# =========================
# EUREKA (KUBERNETES FIX)
# =========================
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=gateway

# =========================
# LOGGING (debug routing)
# =========================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================================================
# ROUTES (STANDARDISATION API: /api/*)
# =========================================================

# USER SERVICE (LOGIN / AUTH / USER API)
spring.cloud.gateway.server.webmvc.routes[0].id=gestion-user
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://GESTION-USER
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

# FORUM
spring.cloud.gateway.server.webmvc.routes[1].id=gestion-forum
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://GESTION-FORUM
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/forums,/forums/**

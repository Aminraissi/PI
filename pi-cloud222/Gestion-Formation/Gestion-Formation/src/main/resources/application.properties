spring.application.name=Gestion-Formation


spring.datasource.url=jdbc:mysql://localhost:3306/Formation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update




spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#server.servlet.context-path=/Formation
server.port=8082

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
app.upload.dir=uploads/images
app.video-upload.dir=uploads/videos
app.resource-upload.dir=uploads/resources


#swager
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false
springdoc.swagger-ui.path=/swagger-ui.html

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true 
